# configs/rescontact.yaml
# Laptop-friendly defaults (ESM2 + optional MSA 1-D). Safe shapes guaranteed.

project:
  seed: 42
  device_preference: ["cpu"]   # try Apple MPS first, then CPU
  # device_preference: ["mps", "cpu"]   # try Apple MPS first, then CPU

paths:
  train_dir: "data/pdb/train"         # PDB/mmCIF files
  test_dir:  "data/pdb/test"
  cache_dir: "./.cache/rescontact"    # embedding & MSA caches (npz/a3m/fasta/xml)
  ckpt_dir:  "./checkpoints"
  logs_dir:  "./logs"

labels:
  contact_threshold_angstrom: 8.0     # Cβ–Cβ (Cα for Gly)
  include_inter_chain: true           # include inter-chain labels
  symmetric: true                     # enforce Y = Y^T

training:
  epochs: 20
  batch_size: 1
  lr: 1.5e-3
  weight_decay: 1.0e-4
  grad_clip: 1.0
  mixed_precision: true               # AMP only active on CUDA
  train_val_split: 0.8
  save_every: 1
  patience: 5

model:
  esm_model: "facebook/esm2_t6_8M_UR50D"  # tiny ESM2
  embed_dim: 320                     # 320 (ESM) + 21 (MSA; zero-padded if missing)
  hidden_dim: 256
  distance_bias_max: 512

features:
  # When true, dataset always returns [L, 341]. If no MSA, last 21 dims are zeros.
  use_msa: false
  msa:
    # Try local A3M first, then Jackhmmer (EMBL-EBI), then BLASTP (NCBI).
    provider_order: ["blastp"]
    #provider_order: ["local", "jackhmmer_remote", "blastp"]

    # 1) Local alignment files (optional)
    local_glob: "data/msa/**/*.a3m"

    # 2) Remote Jackhmmer via EMBL-EBI HMMER REST
    jackhmmer_remote:
      enabled: true
      db: "uniprotrefprot"           # or "uniprotkb" (slower)
      email: null                    # e.g., "you@example.com" (recommended)
      timeout_s: 600                 # generous timeout for web queue
      poll_every_s: 5
      max_seqs: 64

    # 3) Remote BLASTP via NCBI (uses env NCBI_API_KEY if set)
    blastp:
      enabled: true
      db: "swissprot"                # "swissprot" (curated) or "nr" (huge)
      hitlist_size: 25
      expect: "1e-3"
      timeout_s: 120
      max_seqs: 64

    # Defensive cap on rows consumed by any provider
    max_seqs: 64

inference:
  threshold: 0.5

api:
  framework: "fastapi"
  host: "0.0.0.0"
  port: 8000

limits:
  train_max_examples: 2
  test_max_examples: 1
  subset_mode: "random"

streaming:
  enabled: false
  rank: 128
  neg_ratio: 3
  train_batch_pairs: 20000
  max_len_per_chain: 600
  interchain_train: false
  interchain_eval: true
  eval_max_pairs_per_struct: 80000

